version: '3.9'

services:

  # ── Microservices ────────────────────────────────────────────────────────────

  saas-service:
    build: ./saas-service
    container_name: saas-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=saas_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - AUTH_SERVICE_URL=http://auth-service:3002
      - AUTH_SERVICE_INTERNAL_TOKEN=super_secret_internal_token
      - JWT_SECRET=change_me_in_production_min_32_chars
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]
    volumes:
      - ./saas-service:/app
      - /app/node_modules

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=auth_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES_DAYS=7
      - INTERNAL_TOKEN=super_secret_internal_token
      - COMMUNICATION_SERVICE_URL=http://communication-service:3006
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]
    volumes:
      - ./auth-service:/app
      - /app/node_modules

  hotels-service:
    build: ./hotels-service
    container_name: hotels-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=hotels_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - INTERNAL_TOKEN=super_secret_internal_token
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]
    volumes:
      - ./hotels-service:/app
      - /app/node_modules

  guest-service:
    build: ./guest-service
    container_name: guest-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=guest_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - INTERNAL_TOKEN=super_secret_internal_token
      - AUDIT_SERVICE_URL=http://audit-service:3008
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]
    volumes:
      - ./guest-service:/app
      - /app/node_modules

  reservation-service:
    build: ./reservation-service
    container_name: reservation-service
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reservation_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - INTERNAL_TOKEN=super_secret_internal_token
      - HOTELS_SERVICE_URL=http://hotels-service:3003
      - BILLING_SERVICE_URL=http://billing-service:3007
      - GUEST_SERVICE_URL=http://guest-service:3004
      - PORTAL_TOKEN_EXPIRES_HOURS=48
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]

  billing-service:
    build: ./billing-service
    container_name: billing-service
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=development
      - PORT=3007
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=billing_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - INTERNAL_TOKEN=super_secret_internal_token
      - COMMUNICATION_SERVICE_URL=http://communication-service:3006
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]

  audit-service:
    build: ./audit-service
    container_name: audit-service
    ports:
      - "3008:3008"
    environment:
      - NODE_ENV=development
      - PORT=3008
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=audit_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - INTERNAL_TOKEN=super_secret_internal_token
      - ANOMALY_VOID_THRESHOLD=5
      - ANOMALY_WINDOW_MINUTES=60
    depends_on:
      postgres:  { condition: service_healthy }
      rabbitmq:  { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]

  reporting-service:
    build: ./reporting-service
    container_name: reporting-service
    ports:
      - "3009:3009"
    environment:
      - NODE_ENV=development
      - PORT=3009
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=reporting_db
      - DB_USER=saas_user
      - DB_PASSWORD=saas_password
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - RABBITMQ_EXCHANGE=hotel_events
      - JWT_SECRET=change_me_in_production_min_32_chars
      - INTERNAL_TOKEN=super_secret_internal_token
      - BILLING_SERVICE_URL=http://billing-service:3007
      - RESERVATION_SERVICE_URL=http://reservation-service:3005
    depends_on:
      postgres:           { condition: service_healthy }
      rabbitmq:           { condition: service_healthy }
    restart: unless-stopped
    networks: [hotel-network]

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ALL-DB-postgres
    environment:
      - POSTGRES_USER=saas_user
      - POSTGRES_PASSWORD=saas_password
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas_user -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [hotel-network]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: saas-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [hotel-network]

  # ── Nginx: API Gateway + frontend + test panel ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: saas-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # React production build  →  served at /
      - ./frontend/build:/usr/share/nginx/html/app:ro
      # API test panel HTML     →  served at /test/
      - ./test-panel:/usr/share/nginx/html/test:ro
    depends_on:
      - saas-service
      - auth-service
      - hotels-service
      - guest-service
      - reservation-service
      - billing-service
      - audit-service
      - reporting-service
    networks: [hotel-network]

volumes:
  postgres_data:

networks:
  hotel-network:
    driver: bridge
    name: hotel-network