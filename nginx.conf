events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream saas_service        { server saas-service:3001; }
    upstream auth_service        { server auth-service:3002; }
    upstream hotels_service      { server hotels-service:3003; }
    upstream guest_service       { server guest-service:3004; }
    upstream reservation_service { server reservation-service:3005; }
    upstream billing_service     { server billing-service:3007; }
    upstream audit_service       { server audit-service:3008; }
    upstream reporting_service   { server reporting-service:3009; }

    # ── Shared proxy headers macro ─────────────────────────────────────────────
    # (duplicated per location — nginx doesn't support macros natively without lua)

    server {
        listen 80;
        server_name _;

        # ── CORS global (para que el React frontend pueda llamar desde otro puerto) ──
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-internal-token" always;

        # Preflight OPTIONS — responder inmediatamente sin ir al upstream
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ══════════════════════════════════════════════════════════════════════
        # 1. REACT FRONTEND (build production)
        #    Servido desde /usr/share/nginx/html/app
        #    Acceso: http://localhost/
        # ══════════════════════════════════════════════════════════════════════
        location / {
            root  /usr/share/nginx/html/app;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # ══════════════════════════════════════════════════════════════════════
        # 2. API TEST PANEL (archivo HTML estático)
        #    Acceso: http://localhost/test/
        #    El panel tiene los servicios hardcodeados a localhost:PORT,
        #    por eso funciona desde el navegador directo a cada servicio.
        # ══════════════════════════════════════════════════════════════════════
        location /test/ {
            alias /usr/share/nginx/html/test/;
            index api-test-panel.html;
            try_files $uri $uri/ /test/api-test-panel.html;
        }

        # ══════════════════════════════════════════════════════════════════════
        # 3. API GATEWAY — cada servicio con strip del prefijo
        #
        #    IMPORTANTE: el proxy_pass con trailing slash hace el strip.
        #    /saas/api/plans  →  http://saas-service:3001/api/plans
        #    /auth/auth/login →  http://auth-service:3002/auth/login
        # ══════════════════════════════════════════════════════════════════════

        # SaaS Service  →  /saas/**
        location /saas/ {
            proxy_pass         http://saas_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Auth Service  →  /auth/**
        location /auth/ {
            proxy_pass         http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Hotels Service  →  /hotels/**
        location /hotels/ {
            proxy_pass         http://hotels_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Guest Service  →  /guests/**
        location /guests/ {
            proxy_pass         http://guest_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Reservation Service  →  /reservation/**
        location /reservation/ {
            proxy_pass         http://reservation_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Billing Service  →  /billing/**
        location /billing/ {
            proxy_pass         http://billing_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Reporting Service  →  /reporting/**
        location /reporting/ {
            proxy_pass         http://reporting_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Audit Service  →  /audit/**
        location /audit/ {
            proxy_pass         http://audit_service/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Health check global
        location /health {
            return 200 '{"status":"ok","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # Permitir acceso al descubrimiento de hotels-service
        location = /hotels/internal/discovery {
            proxy_pass         http://hotels_service/internal/discovery;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Permitir acceso al descubrimiento de reservation-service
        location = /reservation/internal/discovery {
            proxy_pass         http://reservation_service/internal/discovery;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";
        }

        # Bloquear rutas internas — nunca expuestas al exterior
        location ~ ^/(saas|auth|hotels|guests|reservation|billing|reporting|audit)/internal/ {
            return 403 '{"error":"Forbidden"}';
            add_header Content-Type application/json;
        }
    }
}